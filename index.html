<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <!-- Style -->
  <link rel="stylesheet" href="./style.css"> 
  
  <title>Frontend Mentor | NFT preview card component</title>

</head>
<body>
  <main id="blog">
    <img src="./images/image-equilibrium.jpg" class="logo" alt="Equilibrium">
    <div class="blog-content">
      <h1>Equilibrium #3429</h1>
      <p class="p">Our Equilibrium collection promotes balance and calm.</p>
      <div class="info">
        <div class="label">
          <img src="./images/icon-ethereum.svg" alt="icon-ethereum">
          <p class="first-label">0.041 ETH</p>
        </div>
        <div class="label">
          <img src="./images/icon-clock.svg" alt="icon-clock">
          <p class="second-label">3 days left</p>
        </div>
      </div>
      <hr>
      <div class="avatar">
        <img src="./images/image-avatar.png" alt="image-avatar">
        <p><span class="text">Creation of</span> Jules Wyvern</p>
      </div>
    </div>
  </main>
  <footer>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/Fedayn2009">Fedayn</a>.
  </div>
  </footer>
</body>
</html>
